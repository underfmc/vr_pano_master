# VR Pano Master — Example Project Configuration
# This file is generated by: python master.py init --project <name> --lat <lat> --lon <lon>
#
# Usage:
#   1. Create project:
#      python master.py init --project my_house --lat 57.153 --lon 65.542 --levels 16
#
#   2. Fetch OSM data:
#      python master.py fetch-osm --project my_house
#
#   3. Render PBR equirectangular panorama:
#      python master.py render-pbr --project my_house --width 4096
#
#   4. (Optional) AI polish:
#      python master.py ai-polish --project my_house --denoise 0.25

project:
  id: demo_tyumen_house
  root: projects/demo_tyumen_house
  lat: 57.153000
  lon: 65.542000
  radius_m: 500

main_building:
  levels: 16
  floor_height_m: 3.0
  height_m: 48
  roof_type: flat

camera:
  preset: facade_se_low
  placement: main_relative
  offset_east_m: 55.0
  offset_north_m: -40.0
  height_above_main_m: 6.0

render:
  equirect_width: 4096
  engine: CYCLES
  ground_source: osm_vector
  ground_size_m: 1000
  building_color: [0.38, 0.33, 0.28, 1]
  main_building_color: [0.55, 0.30, 0.18, 1]
  road_color: [0.06, 0.06, 0.07, 1]
  vector_offset_east_m: 0.0
  vector_offset_north_m: 0.0
  vector_scale_multiplier: 1.0

providers:
  accuracy_geometry: osm
  ground: osm_vector
  facade_reference: yandex_panorama
  poi: disabled_for_now

prompts:
  first_positive: >
    photorealistic aerial panorama of Russian residential district, detailed
    apartment buildings with balconies and air conditioners, consistent natural
    colors, concrete panels and brick facades, dark asphalt roads, green lawns,
    trees, parked cars, clear blue sky, real estate drone photography quality
  first_negative: >
    cartoon, illustration, distorted buildings, melted windows, blurry, low
    quality, text, watermark, unrealistic colors, oversaturated

comfy:
  checkpoint: Realistic_Vision_V5.1.safetensors
  controlnet_canny: diffusion_pytorch_model.safetensors
  ipadapter: ip-adapter_sd15.safetensors
  clip_vision: model.safetensors

ai:
  main_model: claude-sonnet-5
  vision_model: gemini-3.5-flash
  cheap_model: qwen3-7-plus
  code_model: claude-sonnet-5
  review_model: gpt-5-5
